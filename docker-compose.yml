services:
  # --- Base de données PostgreSQL ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  # --- Interface PgAdmin ---
  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"

  # --- Serveur Vault ---
  vault:
    image: hashicorp/vault:latest
    container_name: dev-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "mon-token-root"
    cap_add:
      - IPC_LOCK

  # --- API NestJS ---
  api:
    build:
      context: ./backend/pc-tarn-logistique-api
      dockerfile: Dockerfile
    volumes:
      - ./backend/pc-tarn-logistique-api:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    ports:
      - "3000:3000"
    environment:
      VAULT_ADDR: "http://vault:8200"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
      - vault
    command: npm run start:dev -- --watch --poll

  # --- Frontend Angular ---
  web:
    build:
      context: ./frontend/pc-tarn-logistique-web
      dockerfile: Dockerfile
      # 💡 CRUCIAL : On force Docker à utiliser l'étape "development"
      # Cela garantit que c'est ton code actuel qui tourne avec le Hot-Reload
      target: development
    volumes:
      - ./frontend/pc-tarn-logistique-web:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "4200:4200"
    # On garde ta commande de polling pour Windows/Docker Desktop
    command: npm start -- --host 0.0.0.0 --poll 2000

volumes:
  postgres_data: