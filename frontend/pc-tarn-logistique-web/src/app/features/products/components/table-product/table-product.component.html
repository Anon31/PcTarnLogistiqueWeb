<div class="rounded-2xl overflow-hidden shadow-glow text-sm font-light">
    <p-table #productsTable
        [value]="productService.products()"
        [globalFilterFields]="['name', 'category']"
        [rowHover]="true"
        [size]="'small'"
        dataKey="id"
        editMode="row">

        <!-- BARRE DE RECHERCHE DU TABLEAU -->
        <ng-template pTemplate="caption">
            <!-- Utilisation de -mx-2 pour annuler le padding natif de PrimeNG (8px) -->
            <div class="flex justify-between items-center -mx-2 pt-2 pb-6">
                <!-- GAUCHE : Outil de filtrage global -->
                <span class="w-full sm:w-auto">
                    <input
                        pInputText
                        type="text"
                        (input)="productsTable.filterGlobal($any($event.target).value, 'contains')"
                        placeholder="Rechercher un produit..."
                        class="w-full sm:w-64 p-inputtext-sm" />
                </span>

                <!-- DROITE : Actions de gestion -->
                <div class="flex items-center">
                    <!-- 🔒 PROTECTION RBAC : Rapatrié ici, ce bouton route vers le formulaire -->
                    @if (permissionService.canManageUsers()) {
                        <p-button
                            label="Créer un produit"
                            icon="pi pi-plus"
                            [rounded]="true"
                            [raised]="true"
                            size="small"
                            routerLink="/stocks/creer" />
                    }
                </div>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name" style="width:35%">Nom <p-sortIcon field="name" /></th>
                <th pSortableColumn="category" style="width:20%">Catégorie <p-sortIcon field="category" /></th>
                <th pSortableColumn="minThreshold" style="width:15%">Seuil min. <p-sortIcon field="minThreshold" /></th>
                <th style="width:15%">Périssable</th>
                <th style="width:15%" class="text-center">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-product let-editing="editing" let-ri="rowIndex">
            <tr [pEditableRow]="product">
                <td>
                    <p-cellEditor>
                        <ng-template #input><input pInputText type="text" [(ngModel)]="product.name" class="w-full p-inputtext-sm" /></ng-template>
                        <ng-template #output><span class="font-medium">{{product.name}}</span></ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input><input pInputText type="text" [(ngModel)]="product.category" class="w-full p-inputtext-sm" /></ng-template>
                        <ng-template #output><p-tag [value]="product.category" severity="secondary" [rounded]="true" /></ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input><input pInputText type="number" [(ngModel)]="product.minThreshold" class="w-full p-inputtext-sm" /></ng-template>
                        <ng-template #output>{{product.minThreshold}} u.</ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-tag
                        [value]="product.isPerishable ? 'OUI' : 'NON'"
                        [severity]="product.isPerishable ? 'warn' : 'info'"
                        [rounded]="true" />
                </td>
                <td class="text-center">
                    <div class="flex items-center justify-center gap-2">
                        @if (!editing) {
                            <p-button pInitEditableRow icon="pi pi-pencil" [rounded]="true" [text]="true" [raised]="true" size="small" (click)="onRowEditInit(product)" />
                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" [raised]="true" severity="danger" size="small" (click)="onDelete($event, product.id)" />
                        }
                        @if (editing) {
                            <p-button pSaveEditableRow icon="pi pi-check" [rounded]="true" [text]="true" [raised]="true" severity="success" size="small" (click)="onRowEditSave(product)" />
                            <p-button pCancelEditableRow icon="pi pi-times" [rounded]="true" [text]="true" [raised]="true" severity="secondary" size="small" (click)="onRowEditCancel(product, ri)" />
                        }
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
<div class="m-2">
    <span class="text-xs opacity-70 ml-1">Total : {{ productService.products().length }} références catalogue.</span>
</div>
