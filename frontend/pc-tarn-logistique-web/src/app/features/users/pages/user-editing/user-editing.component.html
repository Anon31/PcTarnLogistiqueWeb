<section>
    <app-page-card-wrapper
        title="Compte utilisateur"
        icon="pi pi-user-edit"
        subtitle="Mettez à jour les informations de votre utilisateur."
        [hideDivider]="false">
        @if (loadedUser()) {
            <app-user-form
                mode="edit-admin"
                [userData]="loadedUser()"
                (save)="onUpdate($event)"
                (cancelClick)="onCancel()">
            </app-user-form>
        }
    </app-page-card-wrapper>
</section>
