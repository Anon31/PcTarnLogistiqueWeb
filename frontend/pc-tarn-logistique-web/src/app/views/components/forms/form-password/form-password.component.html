<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold">Ancien mot de passe</label>
        <p-password formControlName="currentPassword" [toggleMask]="true" class="w-full" inputStyleClass="w-full" [feedback]="false"></p-password>
    </div>
    <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold">Nouveau mot de passe</label>
        <p-password formControlName="newPassword" [toggleMask]="true" class="w-full" inputStyleClass="w-full"></p-password>
    </div>
    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-x-6 mt-4">
        <div class="w-full">
            <p-button
                label="Annuler"
                icon="pi pi-times-circle"
                variant="outlined"
                [rounded]="true"
                size="small"
                styleClass="w-full"
                (click)="onCancel()">
            </p-button>
        </div>
        <div class="w-full">
            <p-button
                label="Mettre à jour"
                icon="pi pi-check"
                [rounded]="true"
                [raised]="true"
                size="small"
                styleClass="w-full"
                type="submit">
            </p-button>
        </div>
    </div>
</form>
