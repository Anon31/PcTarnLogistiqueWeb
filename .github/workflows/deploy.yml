name: CI/CD Pipeline - PC Tarn

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  # Étape 1 : Construction de l'image Docker
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 💡 Conversion du nom du repo en minuscules (Obligatoire pour Docker Registry)
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installation propre des dépendances pour valider que le code compile
      - name: Install dependencies
        run: |
          cd backend/pc-tarn-logistique-api && npm ci
          cd ../../frontend/pc-tarn-logistique-web && npm ci

      # Connexion au registre de conteneurs de GitHub
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Création du "paquet" (Image Docker) et envoi vers GitHub
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # Étape 2 : Déploiement sur le serveur VPS
  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase image name (CD)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Connexion SSH sécurisée pour piloter Docker sur le VPS
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Navigation dans le dossier de l'application
            cd ~/pc-tarn || mkdir -p ~/pc-tarn && cd ~/pc-tarn
            
            # 2. Logique d'aiguillage des secrets selon la branche (Staging vs Production)
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              export APP_PORT=4202
              export TAG=master
              export ROLE_ID=${{ secrets.VAULT_PROD_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_PROD_SECRET_ID }}
            else
              export APP_PORT=4201
              export TAG=develop
              export ROLE_ID=${{ secrets.VAULT_STAGING_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_STAGING_SECRET_ID }}
            fi
            
            # 3. Mise à jour des images Docker sur le VPS
            IMAGE_NAME=${{ env.IMAGE_NAME }} docker compose pull
            
            # 4. Redémarrage des conteneurs avec les nouvelles variables injectées
            IMAGE_NAME=${{ env.IMAGE_NAME }} ROLE_ID=$ROLE_ID SECRET_ID=$SECRET_ID TAG=$TAG APP_PORT=$APP_PORT docker compose up -d
