name: CI/CD Pipeline - PC Tarn

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "DOCKER_TAG=production" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Global Linting Dependencies
        run: npm ci

      - name: Install, Lint and Test Backend
        working-directory: ./backend/pc-tarn-logistique-api
        run: |
          npm ci
          npx prisma generate
          npm run lint
          npm run test

      - name: Install, Lint and Test Frontend
        working-directory: ./frontend/pc-tarn-logistique-web
        run: |
          npm ci
          npm run lint
          npm run test -- --watch=false

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/pc-tarn-logistique-api
          file: ./backend/pc-tarn-logistique-api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-backend:${{ env.DOCKER_TAG }}

      - name: Build and push Frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/pc-tarn-logistique-web
          file: ./frontend/pc-tarn-logistique-web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-frontend:${{ env.DOCKER_TAG }}

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables (CD)
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "DOCKER_TAG=production" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_NAME,DOCKER_TAG,VAULT_STAGING_ROLE_ID,VAULT_STAGING_SECRET_ID,VAULT_PROD_ROLE_ID,VAULT_PROD_SECRET_ID
          script: |
            cd ~/pc-tarn || mkdir -p ~/pc-tarn && cd ~/pc-tarn
            export TAG=${{ env.DOCKER_TAG }}
            
            # 💡 EXPLICATION : MATRICE DES PORTS
            # Pour faire tourner 2 environnements sur la même machine, 
            # on doit décaler tous les ports exposés vers l'extérieur.
            if [[ "$TAG" == "production" ]]; then
              export FRONT_PORT=4202
              export BACK_PORT=3002
              export DB_PORT=5432
              export VAULT_PORT=8202
              export PGADMIN_PORT=5052
              export ROLE_ID=${{ secrets.VAULT_PROD_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_PROD_SECRET_ID }}
            else
              export FRONT_PORT=4201
              export BACK_PORT=3001
              export DB_PORT=5431
              export VAULT_PORT=8201
              export PGADMIN_PORT=5051
              export ROLE_ID=${{ secrets.VAULT_STAGING_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_STAGING_SECRET_ID }}
            fi
            
            # 💡 EXPLICATION : ISOLATION DOCKER
            # Le flag `-p pc-tarn-$TAG` crée un réseau isolé.
            # Le flag `--env-file .env.$TAG` charge le fichier .env correspondant
            # créé à l'étape 2.2 sur le serveur.
            IMAGE_NAME=${{ env.IMAGE_NAME }} TAG=$TAG docker compose --env-file .env.$TAG -p pc-tarn-$TAG pull
            IMAGE_NAME=${{ env.IMAGE_NAME }} ROLE_ID=$ROLE_ID SECRET_ID=$SECRET_ID TAG=$TAG FRONT_PORT=$FRONT_PORT BACK_PORT=$BACK_PORT DB_PORT=$DB_PORT VAULT_PORT=$VAULT_PORT PGADMIN_PORT=$PGADMIN_PORT docker compose --env-file .env.$TAG -p pc-tarn-$TAG up -d
