name: CI/CD Pipeline - PC Tarn

on:
  push:
    branches: ["master", "develop"] # Déclenchement sur push
  pull_request:
    branches: ["master", "develop"] # Déclenchement sur PR pour test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 💡 SÉCURITÉ : Le registre Docker (GHCR) exige des noms en minuscules.
      # Cette commande transforme "Anon31/PcTarn..." en "anon31/pctarn..."
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installation des dépendances pour valider la compilation avant le build Docker
      # Note : L'utilisation des parenthèses (cd ... && ...) permet de rester à la racine
      # pour la commande suivante, rendant le script plus lisible et moins sujet aux erreurs.
      - name: Install dependencies
        run: |
          (cd backend/pc-tarn-logistique-api && npm ci)
          (cd frontend/pc-tarn-logistique-web && npm ci)

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏗️ CONSTRUCTION DU BACKEND (API NESTJS)
      - name: Build and push Backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: . # Contexte à la racine pour accéder au dossier backend
          file: ./backend/pc-tarn-logistique-api/Dockerfile # Chemin précis du Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}

      # 🏗️ CONSTRUCTION DU FRONTEND (WEB ANGULAR)
      - name: Build and push Frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: . # Contexte à la racine pour accéder au dossier frontend
          file: ./frontend/pc-tarn-logistique-web/Dockerfile # Chemin précis du Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase image name (CD)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. On se place dans le dossier du projet sur le VPS
            cd ~/pc-tarn || mkdir -p ~/pc-tarn && cd ~/pc-tarn
            
            # 2. On définit les ports et secrets selon la branche (Staging vs Prod)
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              export FRONT_PORT=4202
              export BACK_PORT=3002
              export TAG=master
              export ROLE_ID=${{ secrets.VAULT_PROD_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_PROD_SECRET_ID }}
            else
              export FRONT_PORT=4201
              export BACK_PORT=3001
              export TAG=develop
              export ROLE_ID=${{ secrets.VAULT_STAGING_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_STAGING_SECRET_ID }}
            fi
            
            # 3. On télécharge les deux nouvelles images (Backend et Frontend)
            IMAGE_NAME=${{ env.IMAGE_NAME }} docker compose pull
            # 4. On relance les conteneurs avec les variables injectées dynamiquement
            IMAGE_NAME=${{ env.IMAGE_NAME }} ROLE_ID=$ROLE_ID SECRET_ID=$SECRET_ID TAG=$TAG FRONT_PORT=$FRONT_PORT BACK_PORT=$BACK_PORT docker compose up -d
