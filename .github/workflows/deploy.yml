name: CI/CD Pipeline - PC Tarn

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  # PHASE 1 : CONSTRUCTION ET VALIDATION (CI)
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 💡 Préparation des variables (Minuscules + Tags valides)
      - name: Set environment variables
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "DOCKER_TAG=$(echo ${{ github.ref_name }} | sed 's/\//-/g')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏗️ BUILD BACKEND (On pointe vers le sous-dossier spécifique)
      - name: Build and push Backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/pc-tarn-logistique-api
          file: ./backend/pc-tarn-logistique-api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-backend:${{ env.DOCKER_TAG }}

      # 🏗️ BUILD FRONTEND
      - name: Build and push Frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/pc-tarn-logistique-web
          file: ./frontend/pc-tarn-logistique-web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-frontend:${{ env.DOCKER_TAG }}

  # PHASE 2 : DÉPLOIEMENT SSH (CD)
  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables (CD)
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "DOCKER_TAG=$(echo ${{ github.ref_name }} | sed 's/\//-/g')" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 💡 Injection cruciale des secrets GitHub vers le script SSH
          envs: IMAGE_NAME,DOCKER_TAG,VAULT_STAGING_ROLE_ID,VAULT_STAGING_SECRET_ID,VAULT_PROD_ROLE_ID,VAULT_PROD_SECRET_ID
          script: |
            cd ~/pc-tarn || mkdir -p ~/pc-tarn && cd ~/pc-tarn
            
            # Détection de l'environnement pour aligner avec Vault
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              export FRONT_PORT=4202
              export BACK_PORT=3002
              export TAG=production
              export ROLE_ID=${{ secrets.VAULT_PROD_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_PROD_SECRET_ID }}
            else
              export FRONT_PORT=4201
              export BACK_PORT=3001
              export TAG=staging
              export ROLE_ID=${{ secrets.VAULT_STAGING_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_STAGING_SECRET_ID }}
            fi
            
            # Application des variables pour Docker Compose
            IMAGE_NAME=${{ env.IMAGE_NAME }} TAG=${{ env.DOCKER_TAG }} docker compose pull
            IMAGE_NAME=${{ env.IMAGE_NAME }} ROLE_ID=$ROLE_ID SECRET_ID=$SECRET_ID TAG=$TAG FRONT_PORT=$FRONT_PORT BACK_PORT=$BACK_PORT docker compose up -d