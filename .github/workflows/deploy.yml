name: CI/CD Pipeline - PC Tarn

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          (cd backend/pc-tarn-logistique-api && npm ci)
          (cd frontend/pc-tarn-logistique-web && npm ci)

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables (CD)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 💡 On passe les secrets GitHub via les variables d'environnement de l'action
          envs: IMAGE_NAME,VAULT_STAGING_ROLE_ID,VAULT_STAGING_SECRET_ID,VAULT_PROD_ROLE_ID,VAULT_PROD_SECRET_ID
          script: |
            cd ~/pc-tarn || mkdir -p ~/pc-tarn && cd ~/pc-tarn
            
            # Détection de l'environnement : develop branche -> staging config
            if [[ "${{ github.ref_name }}" == "master" ]]; then
              export APP_PORT=4202
              export TAG=production
              export ROLE_ID=${{ secrets.VAULT_PROD_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_PROD_SECRET_ID }}
            else
              export APP_PORT=4201
              export TAG=staging
              export ROLE_ID=${{ secrets.VAULT_STAGING_ROLE_ID }}
              export SECRET_ID=${{ secrets.VAULT_STAGING_SECRET_ID }}
            fi
            
            # On force l'export pour docker-compose
            export IMAGE_NAME=${{ env.IMAGE_NAME }}
            
            docker compose pull
            docker compose up -d